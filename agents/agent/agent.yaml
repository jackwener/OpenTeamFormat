apiVersion: openteamformat.org/v1alpha1
kind: OpenAgent
metadata:
  name: agent
  displayName: Agent
  description: Base OpenTeamFormat agent package template.
spec:
  instruction:
    file: AGENTS.md
  runtimeAdapters:
    claude:
      instructionFile: CLAUDE.md
      skillsDir: .claude/skills
  skills:
    dir: .agents/skills
    items:
      - id: product-spec
        file: .agents/skills/product-spec.md
        description: Turn ambiguous product intent into a concrete spec.
      - id: task-breakdown
        file: .agents/skills/task-breakdown.md
        description: Break scoped work into small parallelizable tasks.
