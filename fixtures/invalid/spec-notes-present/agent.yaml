apiVersion: openteamformat.org/v1alpha1
kind: OpenAgent
metadata:
  name: spec-notes-present
  displayName: Spec Notes Present
  description: Invalid because OpenAgent.spec must not include notes.
spec:
  instruction:
    file: AGENTS.md
  runtimeAdapters:
    claude:
      instructionFile: CLAUDE.md
      skillsDir: .claude/skills
  notes:
    dir: notes
    items:
      - id: domain
        file: notes/domain.md
        description: This field should not be declared in agent.yaml.
  skills:
    dir: .agents/skills
    items:
      - id: basic-task
        file: .agents/skills/basic-task.md
        description: Complete a basic task.
