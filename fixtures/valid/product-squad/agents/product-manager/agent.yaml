apiVersion: openteamformat.org/v1alpha1
kind: OpenAgent
metadata:
  name: product-manager
  displayName: Product Manager
  description: Clarifies requirements and acceptance criteria.
spec:
  instruction:
    file: AGENTS.md
  runtimeAdapters:
    claude:
      instructionFile: CLAUDE.md
      skillsDir: .claude/skills
  skills:
    dir: .agents/skills
    items:
      - id: product-spec
        file: .agents/skills/product-spec.md
        description: Write a small product spec.
